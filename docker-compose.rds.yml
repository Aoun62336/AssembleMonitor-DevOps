services:
  api:
    image: fire2686/assemblemonitor-backend:7
    container_name: AM_Backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - assemblemonitor_net

  frontend:
    image: fire2686/assemblemonitor-frontend:7
    container_name: AM_Frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
    networks:
      - assemblemonitor_net

volumes:
  uploads_data:

networks:
  assemblemonitor_net:
    driver: bridge
